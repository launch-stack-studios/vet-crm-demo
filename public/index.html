<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet Owner App</title>
</head>
<body>
  <h1>Pet Owner App</h1>
  <button id="loadPetsBtn">Load Pets</button>
  <pre id="petsOutput">Click the button to load pets</pre>
  <script>
    document.getElementById('loadPetsBtn').onclick = function () {
      fetch('/pets')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          document.getElementById('petsOutput').textContent = JSON.stringify(data, null, 2);
        })
        .catch(function (err) {
          document.getElementById('petsOutput').textContent = err.toString();
        });
    };
  </script>
</body>
</html>
